<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <radialGradient id="ogbg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#12233a"/>
      <stop offset="100%" stop-color="#070c13"/>
    </radialGradient>
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C9A227"/>
      <stop offset="52%" stop-color="#3a8dde"/>
      <stop offset="100%" stop-color="#9b7bff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1200" fill="url(#ogbg)"/>
  <!-- deco frame -->
  <rect x="60" y="60" width="1080" height="1080" fill="none" stroke="#C9A227" stroke-width="2" opacity="0.35"/>
  <rect x="78" y="78" width="1044" height="1044" fill="none" stroke="#C9A227" stroke-width="1" opacity="0.16"/>

  <!-- crest -->
  <g transform="translate(540,300) scale(3)" stroke="#C9A227" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="8" y1="30" x2="22" y2="16"/>
    <line x1="32" y1="30" x2="18" y2="16"/>
    <path d="M8 30 l3 -6 l-3 0 z" fill="#C9A227" stroke="none"/>
    <path d="M32 30 l-3 -6 l3 0 z" fill="#C9A227" stroke="none"/>
    <rect x="16" y="10" width="8" height="10" rx="1"/>
    <line x1="20" y1="6" x2="20" y2="10"/>
    <line x1="16.5" y1="15" x2="23.5" y2="15"/>
  </g>

  <text x="600" y="560" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="30" letter-spacing="16" fill="#C9A227">NORTHBOUND HOUSE</text>

  <text x="600" y="700" text-anchor="middle" font-family="'Futura','Century Gothic',Georgia,sans-serif"
        font-size="128" letter-spacing="12" fill="#E8DCC3">THE KEY ROOM</text>

  <rect x="450" y="748" width="300" height="4" fill="url(#spectrum)"/>

  <text x="600" y="838" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-size="36" fill="#c9bda2">Browser escape adventures —</text>
  <text x="600" y="890" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-size="36" fill="#c9bda2">played in order, earned in order.</text>

  <text x="600" y="980" text-anchor="middle" font-family="Georgia, serif"
        font-size="24" letter-spacing="10" fill="#7c8aa0">PAST&#160;&#160;·&#160;&#160;PRESENT&#160;&#160;·&#160;&#160;FUTURE</text>
</svg>
